name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run remote UI smoke test
        env:
          PLANNER_UI_SMOKE_BROWSER_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:ui:smoke
