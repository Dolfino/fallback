services:
  postgres:
    image: postgres:16-alpine
    container_name: planejador-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: planejador
      POSTGRES_USER: planejador
      POSTGRES_PASSWORD: planejador
    ports:
      - "5433:5432"
    volumes:
      - planejador_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planejador -d planejador"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  planejador_postgres_data:
